<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoImpacto Global</title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <h1> EcoImpacto Global</h1>
    <p>Como nossas atitudes impactam o planeta</p>

    <button id="darkModeBtn">
         Modo Escuro
    </button>
</header>

<section class="cards">

    <div class="card">
        <h2>CO Emitido</h2>
        <span id="co2">420 ppm</span>
    </div>

    <div class="card">
        <h2>Temperatura Media</h2>
        <span id="temp">1.2C</span>
    </div>

    <div class="card">
        <h2>Desmatamento</h2>
        <span id="forest">15.000 km</span>
    </div>

</section>

<section class="grafico">
    <h2>Evolucao das Emissoes</h2>

    <canvas id="emissionChart"></canvas>

    <button id="voiceBtn">
        Ouvir Dados
    </button>
</section>

<section class="simulador">

    <h2> Simulador de Impacto</h2>

    <label>
        Quantos km voce dirige por semana?
    </label>

    <input
        type="number"
        id="km"
        value="50"
    >

    <button onclick="calcularImpacto()">
        Calcular
    </button>

    <div id="resultado"></div>

</section>

<footer>
    <p>
        Projeto de Sustentabilidade e Inclusao
    </p>
</footer>

<script src="script.js"></script>

</body>
</html>
